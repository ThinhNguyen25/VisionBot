persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Local demo mode: plain MQTT, no username/password.
# Keep laptop/backend and ESP32-CAM on the same trusted Wi-Fi.
allow_anonymous true

listener 1883 0.0.0.0
protocol mqtt
