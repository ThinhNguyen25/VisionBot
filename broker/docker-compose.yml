services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: visionbot-mosquitto
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  mosquitto_data:
  mosquitto_log: